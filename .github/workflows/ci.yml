name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: movierag
      POSTGRES_PASSWORD: ci-test-password
      POSTGRES_DB: movierag
      DATABASE_URL: postgresql+asyncpg://movierag:ci-test-password@localhost:5432/movierag
      APP_ENV: ci
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen
      - name: Start Postgres via docker compose
        working-directory: infra
        run: docker compose up -d --wait db
      - name: Run pytest
        working-directory: backend
        run: uv run pytest
      - name: Dump compose logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs db
