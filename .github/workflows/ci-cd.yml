name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE: ghcr.io/szczepangrela/movie-rag

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: movierag
      POSTGRES_PASSWORD: ci-test-password
      POSTGRES_DB: movierag
      DATABASE_URL: postgresql+asyncpg://movierag:ci-test-password@localhost:5432/movierag
      APP_ENV: ci
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen
      - name: Create external network (no-op if exists)
        run: docker network create movierag_network 2>/dev/null || true
      - name: Start Postgres via docker compose
        working-directory: infra
        run: docker compose up -d --wait db
      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: uv run pytest
      - name: Dump compose logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs db

  smoke-build:
    name: Smoke build image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image without pushing
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push:
    name: Build and push image to GHCR
    needs: [lint, type-check, test]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-push]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci-vps
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Deploy and verify health
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_SSH_PORT }}" \
            movie-rag@"${{ secrets.VPS_HOST }}" bash /home/movie-rag/deploy-launcher.sh
