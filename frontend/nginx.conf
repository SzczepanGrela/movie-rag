server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a variable in proxy_pass (below) defers
    # upstream resolution to request time, so nginx starts even if api is down
    # and picks up api's new IP after a backend redeploy (re-resolves every 10s).
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Backend health is OUTSIDE /api — UptimeRobot monitors /health.
    location = /health {
        set $upstream api:8000;
        proxy_pass http://$upstream/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # $request_uri keeps the full original path+query (/api/search stays intact).
    location /api/ {
        set $upstream api:8000;
        proxy_pass http://$upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite hashed assets are content-addressed — cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, else clients keep stale asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback for client-side routing (TanStack Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
