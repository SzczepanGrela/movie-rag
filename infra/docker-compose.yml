name: movierag

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: movierag-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # TODO M1.5: move `ports:` to docker-compose.override.yml (dev-only) and stop publishing in production (NPM + dedicated network).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - movierag_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
    container_name: movierag-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      APP_ENV: ${APP_ENV}
    depends_on:
      db:
        condition: service_healthy
    # TODO M1.5: drop `ports:` from compose; NPM will publish 8000 instead.
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  movierag_db_data:
